<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box> -->
      <a-sphere position="0 1.25 -5" radius="1.25" color="#00000"></a-sphere>
      <a-sphere position="0 2.75 -5" radius="0.9" color="#00000"></a-sphere>
      <a-sphere position="0 4 -5" radius="0.65" color="#00000"></a-sphere>
      <a-sphere position="0.25 4.1 -4.35" radius="0.05" color="#000000"></a-sphere>
      <a-sphere position="-0.25 4.1 -4.35" radius="0.05" color="#000000"></a-sphere>
      <a-cone position="0 4 -4.25" radius-bottom="0.25" radius-top="0" rotation="90 0 0" scale="0.5 0.5 0.5" color="#FF9F2B"> </a-cone>
      <!-- <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder> -->
      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="200" height="200" color="#00000"></a-plane> 
      <a-sky color="#ADEEFF"></a-sky> 
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <!--<a-entity environment="preset: dream; dressingAmount: 500"></a-entity> -->
      <a-cylinder position="3 1 -10" radius="0.5"  hight="5"  color="#422D00"  ></a-cylinder>
      <a-cone position="3 5 -10" radius-bottom="1.5" radius-top="0" scale="1 7, 1" color="#004213" ></a-cone>

      <a-cone position="-4 5 -12" radius-bottom="1.5" radius-top="0" scale="1 7, 1" color="#004213" ></a-cone>
      <a-cylinder position="-4 1 -12" radius="0.5"  hight="5"  color="#422D00"  ></a-cylinder>

      <a-cone position="3 5 11" radius-bottom="1.5" radius-top="0" scale="1 7, 1" color="#004213" ></a-cone>
      <a-cylinder position="3 1 11" radius="0.5"  hight="5"  color="#422D00"  ></a-cylinder>

      <a-cone position="7 5 -1" radius-bottom="1.5" radius-top="0" scale="1 7, 1" color="#004213" ></a-cone>
      <a-cylinder position="7 1 -1" radius="0.5"  hight="5"  color="#422D00"  ></a-cylinder>
    </a-scene>
  </body>
</html>
